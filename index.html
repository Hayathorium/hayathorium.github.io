<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayato Isa</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --mono: 'Space Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
  --bg: #07090f;
  --surface: rgba(8,14,22,0.82);
  --surface-hi: rgba(10,18,30,0.92);
  --border: rgba(80,140,180,0.18);
  --border-hi: rgba(100,180,220,0.35);
  --text: #c8dce8;
  --text-dim: #4a6a7a;
  --text-muted: #2a4050;
  --accent: #6ab4d4;
  --accent2: #4ac060;
  --warn: #c8a060;
  --danger: #d44a4a;
  --purple: #8a4ac0;
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; }
#three-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; display:block; }
#scanlines { position:fixed; inset:0; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px); }
#ui { position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:space-between; }
#topbar { display:flex; justify-content:space-between; align-items:center; padding:14px 32px;
  border-bottom:0.5px solid var(--border); background:rgba(7,9,15,0.55); backdrop-filter:blur(8px); }
#topbar .sys-label { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:0.14em; }
#topbar .sys-status { display:flex; gap:20px; align-items:center; }
#topbar .dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:pulse-dot 2.4s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
#topbar .status-txt { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:0.1em; }
#event-ticker { font-family:var(--mono); font-size:10px; color:var(--text-muted); letter-spacing:0.06em; }
#hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 24px; }
#hero .eyebrow { font-family:var(--mono); font-size:10px; color:#e0eef6; letter-spacing:0.22em; margin-bottom:22px; }
#hero h1 { font-family:var(--mono); font-size:clamp(32px,5vw,62px); font-weight:700; color:#e0eef6;
  letter-spacing:0.04em; line-height:1.1; margin-bottom:14px; text-shadow:0 0 40px rgba(106,180,212,0.18); }
#hero .tagline { font-family:var(--sans); font-size:clamp(13px,1.6vw,17px); font-weight:300; color:#ffffff;
  letter-spacing:0.06em; max-width:480px; line-height:1.6; margin-bottom:32px; }
#event-type-selector { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; max-width:600px; }
.et-btn { font-family:var(--mono); font-size:9px; letter-spacing:0.08em; padding:4px 9px;
  background:rgba(8,14,24,0.55); color:var(--text-muted); border:0.5px solid rgba(80,140,180,0.14);
  cursor:pointer; transition:all 0.18s; }
.et-btn:hover { color:var(--text-dim); border-color:var(--border); }
.et-btn.active { color:var(--accent); border-color:var(--border-hi); background:rgba(106,180,212,0.09); }
#nav { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.nav-btn { font-family:var(--mono); font-size:11px; letter-spacing:0.12em; padding:9px 22px;
  background:rgba(8,14,24,0.7); color:var(--accent); border:0.5px solid var(--border-hi);
  cursor:pointer; transition:all 0.2s; position:relative;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
.nav-btn::before { content:''; position:absolute; inset:0; background:rgba(106,180,212,0.06); opacity:0; transition:opacity 0.2s; }
.nav-btn:hover { color:#e0eef6; border-color:var(--accent); }
.nav-btn:hover::before { opacity:1; }
#bottomhud { display:flex; justify-content:space-between; align-items:flex-end; padding:12px 32px 14px;
  border-top:0.5px solid var(--border); background:rgba(7,9,15,0.55); backdrop-filter:blur(8px); }
.hud-metric { text-align:left; }
.hud-metric .k { font-family:var(--mono); font-size:9px; color:var(--text-muted); letter-spacing:0.12em; margin-bottom:2px; }
.hud-metric .v { font-family:var(--mono); font-size:12px; color:var(--accent); letter-spacing:0.06em; }
.hud-metrics { display:flex; gap:28px; }
.legend-row { display:flex; gap:14px; align-items:center; }
.leg { display:flex; align-items:center; gap:5px; font-family:var(--mono); font-size:9px; color:var(--text-muted); letter-spacing:0.06em; }
.leg-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.corner { position:fixed; width:18px; height:18px; z-index:3; pointer-events:none; }
.corner::before,.corner::after { content:''; position:absolute; background:var(--accent); opacity:0.5; }
.corner::before { width:100%; height:0.5px; top:0; left:0; }
.corner::after  { width:0.5px; height:100%; top:0; left:0; }
.corner.tl { top:8px; left:8px; }
.corner.tr { top:8px; right:8px; transform:scaleX(-1); }
.corner.bl { bottom:8px; left:8px; transform:scaleY(-1); }
.corner.br { bottom:8px; right:8px; transform:scale(-1); }
#modal-overlay { display:none; position:fixed; inset:0; z-index:10; background:rgba(4,7,12,0.78);
  backdrop-filter:blur(3px); align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:var(--surface-hi); border:0.5px solid var(--border-hi); width:min(740px,92vw);
  max-height:82vh; display:flex; flex-direction:column; position:relative;
  animation:modal-in 0.22s ease; clip-path:polygon(16px 0%,100% 0%,calc(100% - 16px) 100%,0% 100%); }
@keyframes modal-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
#modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px 14px;
  border-bottom:0.5px solid var(--border); flex-shrink:0; }
#modal-title { font-family:var(--mono); font-size:12px; letter-spacing:0.18em; color:var(--accent); }
#modal-close { font-family:var(--mono); font-size:11px; color:var(--text-dim); background:none;
  border:0.5px solid var(--border); padding:4px 10px; cursor:pointer; letter-spacing:0.1em; transition:all 0.15s; }
#modal-close:hover { color:var(--text); border-color:var(--border-hi); }
#modal-body { padding:28px 28px 32px; overflow-y:auto; flex:1; }
#modal-body::-webkit-scrollbar { width:3px; }
#modal-body::-webkit-scrollbar-track { background:transparent; }
#modal-body::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:2px; }
.modal-section { margin-bottom:32px; }
.modal-section:last-child { margin-bottom:0; }
.section-label { font-family:var(--mono); font-size:9px; letter-spacing:0.22em; color:var(--text-muted);
  margin-bottom:14px; padding-bottom:8px; border-bottom:0.5px solid var(--border); }
.modal-body-text { font-size:14px; font-weight:300; line-height:1.8; color:#8aacbe; }
.exp-item { margin-bottom:24px; padding-left:16px; border-left:1.5px solid var(--border-hi); }
.exp-item .role { font-family:var(--mono); font-size:12px; color:var(--text); letter-spacing:0.04em; margin-bottom:2px; }
.exp-item .org { font-size:12px; color:var(--accent); margin-bottom:4px; }
.exp-item .period { font-family:var(--mono); font-size:10px; color:var(--text-muted); letter-spacing:0.1em; margin-bottom:8px; }
.exp-item .desc { font-size:13px; font-weight:300; color:#6a8a9a; line-height:1.7; }
.skill-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-top:12px; }
.skill-tag { font-family:var(--mono); font-size:10px; letter-spacing:0.08em; color:var(--text-dim);
  border:0.5px solid var(--border); padding:6px 10px; text-align:center; }
.contact-item { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:0.5px solid var(--border); text-decoration:none; }
.contact-item:last-child { border-bottom:none; }
.contact-item .ci-key { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; color:var(--text-muted); width:90px; flex-shrink:0; }
.contact-item .ci-val { font-size:13px; color:var(--accent); }
.contact-item:hover .ci-val { color:#e0eef6; }
.download-btn { display:inline-block; margin-top:20px; font-family:var(--mono); font-size:11px;
  letter-spacing:0.12em; padding:10px 24px; background:transparent; color:var(--accent);
  border:0.5px solid var(--border-hi); cursor:pointer; transition:all 0.2s; text-decoration:none;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
.download-btn:hover { background:rgba(106,180,212,0.08); color:#e0eef6; }
.role a { color:inherit; text-decoration:none; transition:color 0.2s ease; }
.role a:hover { color:var(--accent); text-decoration:underline; }
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="scanlines"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="ui">
  <div id="topbar">
    <span class="sys-label">ATLAS EXPERIMENT &nbsp;·&nbsp; RUN 3 &nbsp;·&nbsp; pp COLLISIONS @ 13.6 TeV</span>
    <div class="sys-status">
      <div class="dot"></div>
      <span class="status-txt" id="status-txt">CIRCULATING</span>
      <span id="event-ticker">Event #0001 · Lumi block 42</span>
    </div>
  </div>
  <div id="hero">
    <p class="eyebrow">PORTFOLIO &nbsp;/&nbsp; RESEARCH &nbsp;/&nbsp; CONTACT</p>
    <h1 id="hero-name">HAYATO ISA</h1>
    <p class="tagline" id="hero-tagline">Applied Mathematics + Data Science<br>UC Berkeley</p>
    <div id="event-type-selector">
      <button class="et-btn active" data-type="ALL" onclick="selectEventType(this)">ALL</button>
      <button class="et-btn" data-type="QCD dijet" onclick="selectEventType(this)">QCD dijet</button>
      <button class="et-btn" data-type="W+jets" onclick="selectEventType(this)">W+jets</button>
      <button class="et-btn" data-type="Z→μμ" onclick="selectEventType(this)">Z→μμ</button>
      <button class="et-btn" data-type="Z→ee" onclick="selectEventType(this)">Z→ee</button>
      <button class="et-btn" data-type="tt̄" onclick="selectEventType(this)">tt̄</button>
      <button class="et-btn" data-type="WW" onclick="selectEventType(this)">WW</button>
      <button class="et-btn" data-type="ZZ" onclick="selectEventType(this)">ZZ</button>
      <button class="et-btn" data-type="WZ" onclick="selectEventType(this)">WZ</button>
      <button class="et-btn" data-type="single top" onclick="selectEventType(this)">single top</button>
      <button class="et-btn" data-type="H→bb̄" onclick="selectEventType(this)">H→bb̄</button>
      <button class="et-btn" data-type="H→ZZ*→4l" onclick="selectEventType(this)">H→ZZ*→4l</button>
      <button class="et-btn" data-type="H→γγ" onclick="selectEventType(this)">H→γγ</button>
      <button class="et-btn" data-type="SUSY-like" onclick="selectEventType(this)">SUSY</button>
      <button class="et-btn" data-type="min. bias" onclick="selectEventType(this)">min. bias</button>
    </div>
    <div id="nav">
      <button class="nav-btn" onclick="openModal('about')">ABOUT</button>
      <button class="nav-btn" onclick="openModal('experience')">EXPERIENCE</button>
      <button class="nav-btn" onclick="openModal('resume')">RÉSUMÉ</button>
      <button class="nav-btn" onclick="openModal('contact')">CONTACT</button>
    </div>
  </div>
  <div id="bottomhud">
    <div class="hud-metrics">
      <div class="hud-metric"><div class="k">√s</div><div class="v">13.6 TeV</div></div>
      <div class="hud-metric"><div class="k">N tracks</div><div class="v" id="m-tracks">—</div></div>
      <div class="hud-metric"><div class="k">ET miss</div><div class="v" id="m-met">—</div></div>
      <div class="hud-metric"><div class="k">N jets</div><div class="v" id="m-jets">—</div></div>
      <div class="hud-metric"><div class="k">Event type</div><div class="v" id="m-type">—</div></div>
    </div>
    <div class="legend-row">
      <div class="leg"><div class="leg-dot" style="background:#6ab4d4"></div>tracks</div>
      <div class="leg"><div class="leg-dot" style="background:#d4a44a"></div>EM cal.</div>
      <div class="leg"><div class="leg-dot" style="background:#8a4ac0"></div>HAD cal.</div>
      <div class="leg"><div class="leg-dot" style="background:#4ac060"></div>muon</div>
      <div class="leg"><div class="leg-dot" style="background:#d44a4a; border-radius:0; width:14px; height:1px"></div>ET miss</div>
    </div>
  </div>
</div>
<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div id="modal-header">
      <span id="modal-title">—</span>
      <button id="modal-close" onclick="closeModal()">[ CLOSE ]</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   EVENT TYPE PIN
══════════════════════════════════════════════════════ */
let pinnedEventType = 'ALL';
function selectEventType(btn) {
  document.querySelectorAll('.et-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  pinnedEventType = btn.dataset.type;
}

/* ══════════════════════════════════════════════════════
   THREE.JS SETUP
══════════════════════════════════════════════════════ */
const threeCanvas = document.getElementById('three-canvas');
let W3 = window.innerWidth, H3 = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
renderer.setSize(W3, H3);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03050d);
scene.fog = new THREE.FogExp2(0x03050d, 0.007);

const camera = new THREE.PerspectiveCamera(46, W3 / H3, 0.05, 600);
let camAz = 1.00;
const CAM_POLAR = 90 * Math.PI / 180; // exactly 90° from vertical
let camR = 60;

function updateCamera() {
  camera.position.set(
    camR * Math.sin(CAM_POLAR) * Math.sin(camAz),
    camR * Math.cos(CAM_POLAR),
    camR * Math.sin(CAM_POLAR) * Math.cos(camAz)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

/* ── Lighting: strong enough to show detector structure in rest state ──
   Matches the cyan-blue ambient glow of the reference image              */
scene.add(new THREE.AmbientLight(0x0d1f35, 2.2));          // blue-tinted ambient base
const hemi = new THREE.HemisphereLight(0x1a3a60, 0x050810, 1.2);
scene.add(hemi);
const dirL = new THREE.DirectionalLight(0x4488cc, 0.9);    // cool blue key light
dirL.position.set(20, 30, 20);
scene.add(dirL);
const rimL = new THREE.DirectionalLight(0x00aacc, 0.4);    // teal rim from opposite side
rimL.position.set(-25, -10, -20);
scene.add(rimL);
const fillL = new THREE.DirectionalLight(0x112244, 0.5);
fillL.position.set(0, -30, 10);
scene.add(fillL);

/* ══════════════════════════════════════════════════════
   DETECTOR GEOMETRY
══════════════════════════════════════════════════════ */
const DHL = 40; // detector half-length

/* ── Beam pipe ── */
{
  const g = new THREE.CylinderGeometry(0.16, 0.16, DHL * 2.2, 24, 1, true);
  const m = new THREE.MeshPhongMaterial({
    color: 0x3a5a70, emissive: 0x0a1520, emissiveIntensity: 0.6,
    transparent: true, opacity: 0.70, side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.z = Math.PI / 2;
  scene.add(mesh);
}

/* ── Inner detector pixel/SCT/TRT layers ──
   Visible as cyan wireframe rings matching the reference image */
const PIXEL_RADII = [1.0, 1.8, 3.2, 5.0, 7.5];
for (const r of PIXEL_RADII) {
  const N = 64;
  const pts = [];
  for (let i = 0; i <= N; i++)
    pts.push(new THREE.Vector3(Math.cos(i/N*Math.PI*2)*r, Math.sin(i/N*Math.PI*2)*r, 0));
  const circGeo = new THREE.BufferGeometry().setFromPoints(pts);
  // Brighter cyan for inner rings — key to matching the reference
  const bright = r < 3 ? 0.55 : r < 6 ? 0.40 : 0.28;
  const circMat = new THREE.LineBasicMaterial({ color: 0x22bbdd, transparent: true, opacity: bright });
  const nRings = r < 4 ? 12 : 8;
  for (let ri = 0; ri < nRings; ri++) {
    const z = -DHL * 0.48 + ri / (nRings-1) * DHL * 0.96;
    const ln = new THREE.Line(circGeo, circMat.clone());
    ln.rotation.y = Math.PI / 2;
    ln.position.x = z;
    scene.add(ln);
  }
  // Longitudinal wires
  const wMat = new THREE.LineBasicMaterial({ color: 0x1188aa, transparent: true, opacity: 0.18 });
  for (let i = 0; i < N; i += 3) {
    const a = i / N * Math.PI * 2;
    const p1 = new THREE.Vector3(-DHL*0.48, r*Math.sin(a), r*Math.cos(a));
    const p2 = new THREE.Vector3( DHL*0.48, r*Math.sin(a), r*Math.cos(a));
    const wg = new THREE.BufferGeometry().setFromPoints([p1, p2]);
    scene.add(new THREE.Line(wg, wMat));
  }
}

/* ── ECAL: segmented cells with visible cyan-blue rest color ── */
const ECAL_R = 10.5;
const N_PHI = 44, N_ETA = 22;
const ecalCells = [];
const ecalGroup = new THREE.Group();
scene.add(ecalGroup);

// ECAL base color: deep blue-green, matching the cyan tint of the reference image
const ECAL_BASE = { color: 0x0a2840, emissive: 0x051828, emissiveInt: 0.8, opacity: 0.30 };
for (let ip = 0; ip < N_PHI; ip++) {
  for (let ie = 0; ie < N_ETA; ie++) {
    const phi = (ip / N_PHI) * Math.PI * 2;
    const eta = (ie / N_ETA - 0.5) * (DHL * 1.7);
    const dPhi = Math.PI * 2 / N_PHI;
    const dZ   = DHL * 1.7 / N_ETA;
    const geo = new THREE.BoxGeometry(dZ * 0.86, 0.7, ECAL_R * dPhi * 0.86);
    const mat = new THREE.MeshPhongMaterial({
      color: ECAL_BASE.color, emissive: ECAL_BASE.emissive,
      emissiveIntensity: ECAL_BASE.emissiveInt,
      transparent: true, opacity: ECAL_BASE.opacity,
      shininess: 30
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(eta, ECAL_R * Math.sin(phi), ECAL_R * Math.cos(phi));
    mesh.rotation.x = Math.PI / 2;
    mesh.rotation.z = -phi;
    ecalGroup.add(mesh);
    ecalCells.push({ mesh, mat, phi, eta, ip, ie });
  }
}

/* ── ECAL endcaps ── */
for (const side of [-1, 1]) {
  for (let i = 0; i < N_PHI; i++) {
    const phi = i / N_PHI * Math.PI * 2;
    const dPhi = Math.PI * 2 / N_PHI;
    const geo = new THREE.BoxGeometry(0.6, 1.5, ECAL_R * dPhi * 0.82);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x0a2033, emissive: 0x051018, emissiveIntensity: 0.7,
      transparent: true, opacity: 0.30, shininess: 20
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(side * DHL * 0.74, ECAL_R * Math.sin(phi), ECAL_R * Math.cos(phi));
    mesh.rotation.z = -phi;
    scene.add(mesh);
  }
}

/* ── HCAL: larger cells, warm dark-teal base ── */
const HCAL_R = 15.5;
const NH_PHI = 32, NH_ETA = 16;
const hcalCells = [];
const hcalGroup = new THREE.Group();
scene.add(hcalGroup);

const HCAL_BASE = { color: 0x0e2030, emissive: 0x061018, emissiveInt: 0.7, opacity: 0.30 };
for (let ip = 0; ip < NH_PHI; ip++) {
  for (let ie = 0; ie < NH_ETA; ie++) {
    const phi = (ip / NH_PHI) * Math.PI * 2;
    const eta = (ie / NH_ETA - 0.5) * (DHL * 1.8);
    const dPhi = Math.PI * 2 / NH_PHI;
    const dZ   = DHL * 1.8 / NH_ETA;
    const geo = new THREE.BoxGeometry(dZ * 0.80, 1.1, HCAL_R * dPhi * 0.80);
    const mat = new THREE.MeshPhongMaterial({
      color: HCAL_BASE.color, emissive: HCAL_BASE.emissive,
      emissiveIntensity: HCAL_BASE.emissiveInt,
      transparent: true, opacity: HCAL_BASE.opacity,
      shininess: 15
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(eta, HCAL_R * Math.sin(phi), HCAL_R * Math.cos(phi));
    mesh.rotation.x = Math.PI / 2;
    mesh.rotation.z = -phi;
    hcalGroup.add(mesh);
    hcalCells.push({ mesh, mat, phi, eta, ip, ie });
  }
}

/* ── Muon MDT chambers: bright cyan panels like the reference image ── */
const muonPanels = [];
const MUON_R = 22;
const NM_SECTORS = 16;
const MUON_BASE = { color: 0x0c2a45, emissive: 0x061525, emissiveInt: 0.85, opacity: 0.30 };

for (let i = 0; i < NM_SECTORS; i++) {
  const phi = i / NM_SECTORS * Math.PI * 2;
  const r = MUON_R + (i % 2) * 2.8;
  const nZ = 8;
  for (let zi = 0; zi < nZ; zi++) {
    const z = -DHL * 0.88 + zi / (nZ-1) * DHL * 1.76;
    const dPhi = Math.PI * 2 / NM_SECTORS;
    const geo = new THREE.BoxGeometry(3.5, 0.16, r * dPhi * 0.76);
    const mat = new THREE.MeshPhongMaterial({
      color: MUON_BASE.color, emissive: MUON_BASE.emissive,

   PHYSICS EVENT GENERATORS  (ported verbatim from reference HTML)

let tracks3D = [], eventNum3D = 1, nextCollision = 800, lastTS = 0, metObj = null;

// Physics state for current event (mirrors reference's global arrays)
let evTracks = [], evCaloHits = [], evMuons = [], evJets = [];
let evMetAngle = 0, evMetMag = 0;

function rnd(a,b){ return a+(b-a)*Math.random(); }
function rndInt(a,b){ return Math.floor(rnd(a,b+1)); }
function randomPhi(){ return rnd(0, Math.PI*2); }
function randomJetPhis(n){ return Array.from({length:n}, randomPhi); }
function backToBack(spread=0.15){
  const phi1 = randomPhi();
  return [phi1, phi1 + Math.PI + rnd(-spread, spread)];
}

/* ── shared helpers (exact port from reference) ── */
function buildJets(jetDefs){
  const spread = 0.22;
  for(const jd of jetDefs){
    evJets.push({phi:jd.phi, ET:jd.ET, dphi:spread});
    for(let k=0;k<rndInt(6,16);k++){
      const isEM = Math.random()>0.45;
      evCaloHits.push({phi:jd.phi+rnd(-spread,spread), r:rnd(0.62,0.90), w:rnd(0.008,0.022), ET:jd.ET*rnd(0.1,0.6), isEM, isJet:true});
    }
    const nTracksInJet = rndInt(5,15);
    for(let i=0;i<nTracksInJet;i++){
      const phi = jd.phi + rnd(-0.25,0.25);
      const pt  = rnd(0.3,1.0);
      const charge = Math.random()>0.5?1:-1;
      evTracks.push({phi, pt, curve:charge*rnd(0.04,0.18)*(1/pt), r:pt});
    }
  }
  for(let i=0;i<rndInt(3,8);i++){
    const phi=randomPhi(), pt=rnd(0.2,0.5), charge=Math.random()>0.5?1:-1;
    evTracks.push({phi, pt, curve:charge*rnd(0.04,0.18)*(1/pt), r:pt});
  }
  for(let i=0;i<rndInt(4,10);i++){
    evCaloHits.push({phi:randomPhi(), r:rnd(0.55,0.85), w:rnd(0.005,0.012), ET:rnd(0.03,0.12), isEM:Math.random()>0.3, isJet:false});
  }
}
function addMuon(phi,pt){
  evMuons.push({phi:phi!==undefined?phi:randomPhi(), pt:pt!==undefined?pt:rnd(0.5,1.0)});
}
function addElectron(phi){
  const p=phi!==undefined?phi:randomPhi(), ET=rnd(0.55,1.0);
  for(let k=0;k<rndInt(4,8);k++)
    evCaloHits.push({phi:p+rnd(-0.06,0.06), r:rnd(0.63,0.78), w:rnd(0.006,0.014), ET:ET*rnd(0.4,1.0), isEM:true, isJet:false});
  const charge=Math.random()>0.5?1:-1;
  evTracks.push({phi:p, pt:ET, curve:charge*rnd(0.04,0.12)*(1/ET), r:ET});
}
function addPhoton(phi){
  const p=phi!==undefined?phi:randomPhi(), ET=rnd(0.5,1.0);
  for(let k=0;k<rndInt(5,10);k++)
    evCaloHits.push({phi:p+rnd(-0.05,0.05), r:rnd(0.63,0.76), w:rnd(0.006,0.013), ET:ET*rnd(0.5,1.0), isEM:true, isJet:false});
}

/* ── process generators (exact port) ── */
function generateQCDDijet(){
  const [phi1,phi2]=backToBack(0.15);
  buildJets([{phi:phi1,ET:rnd(0.7,1.0)},{phi:phi2,ET:rnd(0.7,1.0)}]);
  evMetMag=rnd(0,0.10); evMetAngle=randomPhi();

}

  const nJ=rndInt(2,4);
  buildJets(randomJetPhis(nJ).map(phi=>({phi,ET:rnd(0.4,0.85)})));
  const lepPhi=randomPhi(); addMuon(lepPhi,rnd(0.6,1.0));
  evMetMag=rnd(0.50,0.78); evMetAngle=lepPhi+Math.PI+rnd(-0.4,0.4);

/* ── weighted process table (same weights as reference) ── */
const PROCESS_TABLE = [
  {w:0.35, label:'QCD dijet',    gen:generateQCDDijet},
  {w:0.18, label:'W+jets',       gen:generateWJets},
  {w:0.08, label:'Z→μμ',        gen:generateZMuMu},
  {w:0.08, label:'Z→ee',        gen:generateZEE},
  {w:0.10, label:'tt̄',          gen:generateTTbar},
  {w:0.05, label:'WW',           gen:generateWW},
  {w:0.04, label:'ZZ',           gen:generateZZ},
  {w:0.04, label:'WZ',           gen:generateWZ},
  {w:0.04, label:'single top',   gen:generateSingleTop},
  {w:0.015,label:'H→bb̄',       gen:generateHiggsBB},
  {w:0.010,label:'H→ZZ*→4l',    gen:generateHiggsZZ4L},
  {w:0.010,label:'H→γγ',        gen:generateHiggsGamGam},
  {w:0.02, label:'SUSY-like',    gen:generateSUSY},
  {w:0.04, label:'min. bias',    gen:generateMinBias},
];
const TOTAL_W = PROCESS_TABLE.reduce((s,p)=>s+p.w,0);

function pickGenerator(){
  if(pinnedEventType !== 'ALL'){
    const found = PROCESS_TABLE.find(p => p.label === pinnedEventType);
    if(found) return found.gen;
  }
  let r = Math.random()*TOTAL_W;
  for(const p of PROCESS_TABLE){ r -= p.w; if(r<=0) return p.gen; }
  return PROCESS_TABLE[PROCESS_TABLE.length-1].gen;
}

/* ══════════════════════════════════════════════════════
   3D TRACK + DEPOSIT SPAWNING
══════════════════════════════════════════════════════ */
function etaPhiToDir(eta, phi){
  const theta = 2*Math.atan(Math.exp(-eta));
  return new THREE.Vector3(Math.cos(theta), Math.sin(theta)*Math.sin(phi), Math.sin(theta)*Math.cos(phi));
}

function lightECAL(phi, eta, type, spread){
  const col = type==='jet'?0xff8800 : type==='muon'?0xff44ff : type==='photon'?0x44ff88 : type==='electron'?0xffff44 : 0x44ffcc;
  const intense = type==='jet'?1.8 : type==='electron'?1.5 : 1.2;
  const targetIp = Math.round(phi/(Math.PI*2)*N_PHI + N_PHI) % N_PHI;
  const etaFrac  = (eta/(DHL*0.85))*0.5 + 0.5;
  const targetIe = Math.round(etaFrac * N_ETA);
  for(let dp=-spread;dp<=spread;dp++){
    for(let de=-spread;de<=spread;de++){
      const ip = (targetIp+dp+N_PHI)%N_PHI;
      const ie = Math.max(0, Math.min(N_ETA-1, targetIe+de));
      const cell = ecalCells.find(c=>c.ip===ip && c.ie===ie);
      if(!cell) continue;
      const str = 1 - 0.35*(Math.abs(dp)+Math.abs(de));
      if(str<=0) continue;
      cell.mat.color.setHex(col);
      cell.mat.emissive.setHex(col);
      cell.mat.emissiveIntensity = str*intense*3.0;
      cell.mat.opacity = 0.95;
      cell.mesh.scale.y = 1 + str*intense*0.7;
      cell._litTimer = 120 + Math.floor(Math.random()*50);
    }
  }
}

function lightHCAL(phi, eta, spread){
  const targetIp = Math.round(phi/(Math.PI*2)*NH_PHI + NH_PHI) % NH_PHI;
  const etaFrac  = (eta/(DHL*0.90))*0.5 + 0.5;
  const targetIe = Math.round(etaFrac * NH_ETA);
  for(let dp=-spread;dp<=spread;dp++){
    for(let de=-spread;de<=spread;de++){
      const ip = (targetIp+dp+NH_PHI)%NH_PHI;
      const ie = Math.max(0, Math.min(NH_ETA-1, targetIe+de));
      const cell = hcalCells.find(c=>c.ip===ip && c.ie===ie);
      if(!cell) continue;
      const str = 1 - 0.40*(Math.abs(dp)+Math.abs(de));
      if(str<=0) continue;
      cell.mat.color.setHex(0xff5500);
      cell.mat.emissive.setHex(0xff3300);
      cell.mat.emissiveIntensity = str*3.2;
      cell.mat.opacity = 0.92;
      cell.mesh.scale.y = 1 + str*0.8;
      cell._litTimer = 130 + Math.floor(Math.random()*60);
    }
  }
}

function lightMuon(phi){
  muonPanels.forEach(p=>{
    const diff = Math.abs(((p.phi - phi + Math.PI*3)%(Math.PI*2)) - Math.PI);
    if(diff < 0.45){
      p.mat.color.setHex(0xee55ff);
      p.mat.emissive.setHex(0xaa00cc);
      p.mat.emissiveIntensity = 2.8;
      p.mat.opacity = 0.95;
      p.litTimer = 110;
    }
  });
}

function spawnTrack3D(phi, kappa, maxR, col, type){
  // kappa = curvature in yz plane; phi = azimuthal angle
  // eta drawn from physics-motivated distribution
  const eta = (Math.random()-0.5)*3.8;
  const points = [new THREE.Vector3()];
  let pos = new THREE.Vector3(), curPhi = phi;
  const steps = 180;
  for(let s=0;s<steps;s++){
    curPhi += kappa;
    const d = etaPhiToDir(eta, curPhi);
    pos = pos.clone().addScaledVector(d, 0.22);
    points.push(pos.clone());
    if(pos.length() > maxR) break;
  }
  if(points.length < 2) return;
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  let mat;
  if(type==='photon'){
    mat = new THREE.LineDashedMaterial({color:col,linewidth:1.5,dashSize:0.4,gapSize:0.2,transparent:true,opacity:0.90});
  } else {
    mat = new THREE.LineBasicMaterial({color:col,linewidth:type==='muon'?2.5:type==='jet'?1.2:1,transparent:true,opacity:0.88});
  }
  const line = new THREE.Line(geo,mat);
  if(type==='photon') line.computeLineDistances();
  scene.add(line);
  tracks3D.push({line,mat,born:Date.now()});

  // Deposits
  const hitEta = eta*2.5; // scale to detector coords
  if(type==='jet'){
    const spread=0.22, nRays=rndInt(10,18);
    setTimeout(()=>{ lightECAL(phi,hitEta,'jet',2); lightHCAL(phi,hitEta,2); },250+Math.random()*150);
    for(let i=0;i<nRays;i++){
      const dp=phi+(Math.random()-0.5)*spread, de=eta+(Math.random()-0.5)*spread;
      const d2=etaPhiToDir(de,dp);
      const len=rnd(HCAL_R*0.4, HCAL_R*0.9);
      const rg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), d2.clone().multiplyScalar(len)]);
      const rm=new THREE.LineBasicMaterial({color:i===0?0xff6600:0xff9900,transparent:true,opacity:Math.max(0.12,0.6-i*0.04)});
      const rl=new THREE.Line(rg,rm);
      scene.add(rl);
      tracks3D.push({line:rl,mat:rm,born:Date.now()});
    }
  } else if(type==='electron'){
    setTimeout(()=>lightECAL(phi,hitEta,'electron',1),280+Math.random()*150);
  } else if(type==='photon'){
    setTimeout(()=>lightECAL(phi,hitEta,'photon',1),280+Math.random()*150);
  } else if(type==='muon'){
    setTimeout(()=>lightMuon(phi),500+Math.random()*250);
  } else if(type==='charged'){
    if(Math.random()<0.15) setTimeout(()=>lightECAL(phi,hitEta,'charged',0),350+Math.random()*200);
  }
}

/* ── Missing ET 3D arrow ── */
function showMET3D(phi, mag){
  if(metObj){ scene.remove(metObj); metObj=null; }
  const dir = new THREE.Vector3(0, Math.sin(phi), Math.cos(phi));
  const end = dir.clone().multiplyScalar(mag * 12);
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), end]);
  const m = new THREE.LineDashedMaterial({color:0xee3333,linewidth:2,dashSize:0.55,gapSize:0.28,transparent:true,opacity:0.88});
  metObj = new THREE.Line(g,m); metObj.computeLineDistances();
  scene.add(metObj);
  setTimeout(()=>{ if(metObj){scene.remove(metObj);metObj=null;} }, 4800);
}

/* ══════════════════════════════════════════════════════
   MAIN EVENT GENERATOR — ties reference physics to 3D
══════════════════════════════════════════════════════ */
function resetCells(){
  for(const c of ecalCells){
    if(c._litTimer > 0){
      c.mat.color.setHex(ECAL_BASE.color); c.mat.emissive.setHex(ECAL_BASE.emissive);
      c.mat.emissiveIntensity = ECAL_BASE.emissiveInt; c.mat.opacity = ECAL_BASE.opacity;
      c.mesh.scale.y = 1; c._litTimer = 0;
    }
  }
  for(const c of hcalCells){
    if(c._litTimer > 0){
      c.mat.color.setHex(HCAL_BASE.color); c.mat.emissive.setHex(HCAL_BASE.emissive);
      c.mat.emissiveIntensity = HCAL_BASE.emissiveInt; c.mat.opacity = HCAL_BASE.opacity;
      c.mesh.scale.y = 1; c._litTimer = 0;
    }
  }
  for(const p of muonPanels){
    p.mat.color.setHex(MUON_BASE.color); p.mat.emissive.setHex(MUON_BASE.emissive);
    p.mat.emissiveIntensity = MUON_BASE.emissiveInt; p.mat.opacity = MUON_BASE.opacity;
    p.litTimer = 0;
  }
}

function generateEvent3D(){
  // Clear old tracks
  for(const t of tracks3D) scene.remove(t.line);
  tracks3D.length = 0;
  if(metObj){ scene.remove(metObj); metObj=null; }
  resetCells();

  // Reset per-event physics state
  evTracks=[]; evCaloHits=[]; evMuons=[]; evJets=[];
  evMetMag=0; evMetAngle=0;

  // Run the reference generator
  const result = pickGenerator()();

  // HUD
  eventNum3D++;
  document.getElementById('event-ticker').textContent =
    'Event #'+String(eventNum3D).padStart(4,'0')+' · Lumi block '+rndInt(10,99);
  document.getElementById('m-tracks').textContent = evTracks.length;
  document.getElementById('m-jets').textContent   = result.nJ;
  document.getElementById('m-met').textContent    = evMetMag>0.08 ? Math.round(evMetMag*200)+' GeV' : '< 20 GeV';
  document.getElementById('m-type').textContent   = result.label;
  document.getElementById('status-txt').textContent = 'COLLISION';
  setTimeout(()=>document.getElementById('status-txt').textContent='CIRCULATING', 900);

  // Spawn charged tracks from evTracks
  let delay = 0;
  for(const t of evTracks){
    const d = delay;
    const charge = t.curve > 0 ? 1 : -1;
    const kappa = charge * rnd(0.008, 0.022);
    setTimeout(()=> spawnTrack3D(t.phi, kappa, 9.2, 0x00ffee, 'charged'), d);
    delay += 18 + Math.random()*22;
  }

  // Muons
  for(const m of evMuons){
    const d = delay;
    setTimeout(()=> spawnTrack3D(m.phi, (Math.random()-0.5)*0.012, MUON_R+4, 0xff44ff, 'muon'), d);
    delay += 55;
  }

  // Jets: for each jet, spawn a track cluster and cone
  for(const j of evJets){
    const d = delay;
    setTimeout(()=> spawnTrack3D(j.phi, 0, HCAL_R+1.5, 0xff8800, 'jet'), d);
    delay += 70 + Math.random()*40;
  }

  // Photons / electrons from calo hits
  const photonHits = evCaloHits.filter(h => h.isEM && !h.isJet);
  for(const h of photonHits){
    if(Math.random() < 0.25){
      const d = delay;
      const isElectron = evTracks.some(t => Math.abs(((t.phi-h.phi+Math.PI*3)%(Math.PI*2))-Math.PI) < 0.1);
      setTimeout(()=> spawnTrack3D(h.phi, 0, ECAL_R, isElectron?0xffff44:0x44ff88, isElectron?'electron':'photon'), d);
      delay += 50;
    }
  }

  // Missing ET
  if(evMetMag > 0.08){
    setTimeout(()=> showMET3D(evMetAngle, evMetMag), delay+250);
  }
}

/* ══════════════════════════════════════════════════════
   ANIMATION LOOP
══════════════════════════════════════════════════════ */
let frame3D = 0;
function animate3D(ts){
  requestAnimationFrame(animate3D);
  frame3D++;
  const dt = ts - lastTS; lastTS = ts;

  nextCollision -= dt;
  if(nextCollision <= 0){ generateEvent3D(); nextCollision = 3400; }

  // Slow auto-rotate
  camAz += 0.0010;
  updateCamera();

  // Fade old tracks
  const now = Date.now();
  for(let i=tracks3D.length-1;i>=0;i--){
    const t = tracks3D[i];
    const age = (now - t.born)/1000;
    if(age > 3.0){
      t.mat.opacity = Math.max(0, t.mat.opacity - 0.022);
      if(t.mat.opacity <= 0){ scene.remove(t.line); tracks3D.splice(i,1); }
    }
  }

  // Decay ECAL back to base
  for(const c of ecalCells){
    if(!c._litTimer || c._litTimer <= 0) continue;
    c._litTimer--;
    if(c._litTimer <= 0){
      c.mat.color.setHex(ECAL_BASE.color); c.mat.emissive.setHex(ECAL_BASE.emissive);
      c.mat.emissiveIntensity = ECAL_BASE.emissiveInt; c.mat.opacity = ECAL_BASE.opacity; c.mesh.scale.y = 1;
    } else {
      c.mat.emissiveIntensity = Math.max(ECAL_BASE.emissiveInt, c.mat.emissiveIntensity * 0.991);
    }
  }

  // Decay HCAL
  for(const c of hcalCells){
    if(!c._litTimer || c._litTimer <= 0) continue;
    c._litTimer--;
    if(c._litTimer <= 0){
      c.mat.color.setHex(HCAL_BASE.color); c.mat.emissive.setHex(HCAL_BASE.emissive);
      c.mat.emissiveIntensity = HCAL_BASE.emissiveInt; c.mat.opacity = HCAL_BASE.opacity; c.mesh.scale.y = 1;
    } else {
      c.mat.emissiveIntensity = Math.max(HCAL_BASE.emissiveInt, c.mat.emissiveIntensity * 0.990);
    }
  }

  // Decay muon panels
  for(const p of muonPanels){
    if(p.litTimer > 0){
      p.litTimer--;
      if(p.litTimer <= 0){
        p.mat.color.setHex(MUON_BASE.color); p.mat.emissive.setHex(MUON_BASE.emissive);
        p.mat.emissiveIntensity = MUON_BASE.emissiveInt; p.mat.opacity = MUON_BASE.opacity;
      }
    }
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize',()=>{
  W3=window.innerWidth; H3=window.innerHeight;
  renderer.setSize(W3,H3); camera.aspect=W3/H3; camera.updateProjectionMatrix();
});
requestAnimationFrame(animate3D);
