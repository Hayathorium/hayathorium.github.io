<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Hayato Isa</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mono: 'Space Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
  --bg: #07090f;
  --surface: rgba(8,14,22,0.82);
  --surface-hi: rgba(10,18,30,0.92);
  --border: rgba(80,140,180,0.18);
  --border-hi: rgba(100,180,220,0.35);
  --text: #c8dce8;
  --text-dim: #4a6a7a;
  --text-muted: #2a4050;
  --accent: #6ab4d4;
  --accent2: #4ac060;
  --warn: #c8a060;
  --danger: #d44a4a;
  --purple: #8a4ac0;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
}

/* ── Canvas ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ── Scanlines overlay ── */
#scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
}

/* ── Main layout ── */
#ui {
  position: fixed;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 0;
}

/* ── Top bar ── */
#topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 32px;
  border-bottom: 0.5px solid var(--border);
  background: rgba(7,9,15,0.6);
  backdrop-filter: blur(6px);
}
#topbar .sys-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.14em;
}
#topbar .sys-status {
  display: flex;
  gap: 20px;
  align-items: center;
}
#topbar .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pulse-dot 2.4s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#topbar .status-txt {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
#event-ticker {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}

/* ── Center hero ── */
#hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  text-align: center;
  padding: 0 24px;
}

#hero .eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  color: #e0eef6;
  letter-spacing: 0.22em;
  margin-bottom: 22px;
}

#hero h1 {
  font-family: var(--mono);
  font-size: clamp(32px, 5vw, 62px);
  font-weight: 700;
  color: #e0eef6;
  letter-spacing: 0.04em;
  line-height: 1.1;
  margin-bottom: 14px;
  text-shadow: 0 0 40px rgba(106,180,212,0.18);
}

#hero .tagline {
  font-family: var(--sans);
  font-size: clamp(13px, 1.6vw, 17px);
  font-weight: 300;
  color: #ffffff;
  letter-spacing: 0.06em;
  max-width: 480px;
  line-height: 1.6;
  margin-bottom: 48px;
}

/* ── Nav buttons ── */
#nav {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.nav-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  padding: 9px 22px;
  background: rgba(8,14,24,0.7);
  color: var(--accent);
  border: 0.5px solid var(--border-hi);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.nav-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(106,180,212,0.06);
  opacity: 0;
  transition: opacity 0.2s;
}
.nav-btn:hover { color: #e0eef6; border-color: var(--accent); }
.nav-btn:hover::before { opacity: 1; }

/* ── Bottom HUD ── */
#bottomhud {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 12px 32px 14px;
  border-top: 0.5px solid var(--border);
  background: rgba(7,9,15,0.6);
  backdrop-filter: blur(6px);
}
.hud-metric { text-align: left; }
.hud-metric .k {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  margin-bottom: 2px;
}
.hud-metric .v {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.06em;
}
.hud-metrics { display: flex; gap: 28px; }
.legend-row { display: flex; gap: 14px; align-items: center; }
.leg { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.06em; }
.leg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Crosshair corners ── */
.corner {
  position: fixed;
  width: 18px; height: 18px;
  z-index: 3;
  pointer-events: none;
}
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: var(--accent);
  opacity: 0.5;
}
.corner::before { width: 100%; height: 0.5px; top: 0; left: 0; }
.corner::after  { width: 0.5px; height: 100%; top: 0; left: 0; }
.corner.tl { top: 8px; left: 8px; }
.corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
.corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
.corner.br { bottom: 8px; right: 8px; transform: scale(-1); }

/* ── Modal ── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10;
  background: rgba(4,7,12,0.78);
  backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }

#modal {
  background: var(--surface-hi);
  border: 0.5px solid var(--border-hi);
  width: min(740px, 92vw);
  max-height: 82vh;
  display: flex;
  flex-direction: column;
  position: relative;
  animation: modal-in 0.22s ease;
  clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
}
@keyframes modal-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}

#modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px 14px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
#modal-title {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--accent);
}
#modal-close {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  background: none;
  border: 0.5px solid var(--border);
  padding: 4px 10px;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
#modal-close:hover { color: var(--text); border-color: var(--border-hi); }

#modal-body {
  padding: 28px 28px 32px;
  overflow-y: auto;
  flex: 1;
}
#modal-body::-webkit-scrollbar { width: 3px; }
#modal-body::-webkit-scrollbar-track { background: transparent; }
#modal-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

/* ── Modal content styles ── */
.modal-section { margin-bottom: 32px; }
.modal-section:last-child { margin-bottom: 0; }

.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--text-muted);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border);
}

.modal-body-text {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.8;
  color: #8aacbe;
}

.exp-item {
  margin-bottom: 24px;
  padding-left: 16px;
  border-left: 1.5px solid var(--border-hi);
}
.exp-item .role {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  letter-spacing: 0.04em;
  margin-bottom: 2px;
}
.exp-item .org {
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 4px;
}
.exp-item .period {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.exp-item .desc {
  font-size: 13px;
  font-weight: 300;
  color: #6a8a9a;
  line-height: 1.7;
}

.skill-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.skill-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  border: 0.5px solid var(--border);
  padding: 6px 10px;
  text-align: center;
}

.resume-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
}
.resume-row:last-child { border-bottom: none; }
.resume-row .label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}
.resume-row .value {
  font-size: 13px;
  color: var(--accent);
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
  text-decoration: none;
}
.contact-item:last-child { border-bottom: none; }
.contact-item .ci-key {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  width: 90px;
  flex-shrink: 0;
}
.contact-item .ci-val {
  font-size: 13px;
  color: var(--accent);
}
.contact-item:hover .ci-val { color: #e0eef6; }

.download-btn {
  display: inline-block;
  margin-top: 20px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  padding: 10px 24px;
  background: transparent;
  color: var(--accent);
  border: 0.5px solid var(--border-hi);
  cursor: pointer;
  transition: all 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.download-btn:hover { background: rgba(106,180,212,0.08); color: #e0eef6; }

.role a {
  color: inherit;
  text-decoration: none;
  transition: color 0.2s ease;
}

.role a:hover {
  color: var(--accent);
  text-decoration: underline;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="scanlines"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="ui">
  <div id="topbar">
    <span class="sys-label">ATLAS EXPERIMENT &nbsp;·&nbsp; RUN 3 &nbsp;·&nbsp; pp COLLISIONS @ 13.6 TeV</span>
    <div class="sys-status">
      <div class="dot"></div>
      <span class="status-txt" id="status-txt">CIRCULATING</span>
      <span id="event-ticker">Event #0001 · Lumi block 42</span>
    </div>
  </div>

  <div id="hero">
    <p class="eyebrow">PORTFOLIO &nbsp;/&nbsp; RESEARCH &nbsp;/&nbsp; CONTACT</p>
    <h1 id="hero-name">HAYATO ISA</h1>
    <p class="tagline" id="hero-tagline">Applied Mathematics + Data Science<br>UC Berkeley</p>
    <div id="nav">
      <button class="nav-btn" onclick="openModal('about')">ABOUT</button>
      <button class="nav-btn" onclick="openModal('experience')">EXPERIENCE</button>
      <button class="nav-btn" onclick="openModal('resume')">RÉSUMÉ</button>
      <button class="nav-btn" onclick="openModal('contact')">CONTACT</button>
    </div>
  </div>

  <div id="bottomhud">
    <div class="hud-metrics">
      <div class="hud-metric"><div class="k">√s</div><div class="v">13.6 TeV</div></div>
      <div class="hud-metric"><div class="k">N tracks</div><div class="v" id="m-tracks">—</div></div>
      <div class="hud-metric"><div class="k">ET miss</div><div class="v" id="m-met">—</div></div>
      <div class="hud-metric"><div class="k">N jets</div><div class="v" id="m-jets">—</div></div>
      <div class="hud-metric"><div class="k">Event type</div><div class="v" id="m-type">—</div></div>
    </div>
    <div class="legend-row">
      <div class="leg"><div class="leg-dot" style="background:#6ab4d4"></div>tracks</div>
      <div class="leg"><div class="leg-dot" style="background:#d4a44a"></div>EM cal.</div>
      <div class="leg"><div class="leg-dot" style="background:#8a4ac0"></div>HAD cal.</div>
      <div class="leg"><div class="leg-dot" style="background:#4ac060"></div>muon</div>
      <div class="leg"><div class="leg-dot" style="background:#d44a4a; border-radius:0; width:14px; height:1px"></div>ET miss</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div id="modal-header">
      <span id="modal-title">—</span>
      <button id="modal-close" onclick="closeModal()">[ CLOSE ]</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ════════════════════════════════
   PARTICLE DETECTOR BACKGROUND
   ════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, R;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  CX = W/2; CY = H/2;
  R = Math.min(W, H) * 0.42;
}
resize();
window.addEventListener('resize', () => { resize(); });

let tracks=[], caloHits=[], muons=[], jets=[], metAngle=0, metMag=0;
let eventNum=1, autoT=0, last=0, animT=0, animating=false, animDur=1100;

function rnd(a,b){return a+(b-a)*Math.random();}
function rndInt(a,b){return Math.floor(rnd(a,b+1));}
function hexAlpha(hex,a){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}
function ease(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

/* ════════════════════════════════
   PHYSICS EVENT GENERATORS
   ════════════════════════════════ */

/* ── shared helpers ── */
function buildJets(jetDefs) {
  const spread = 0.22;
  for (const jd of jetDefs) {
    jets.push({phi: jd.phi, ET: jd.ET, dphi: spread});
    for (let k = 0; k < rndInt(6,16); k++) {
      const isEM = Math.random() > 0.45;
      caloHits.push({phi: jd.phi + rnd(-spread, spread), r: rnd(0.62,0.90),
                     w: rnd(0.008,0.022), ET: jd.ET * rnd(0.1,0.6), isEM});
    }
    // Level 1: tracks clustered around each jet
    const nTracksInJet = rndInt(5,15);
    for (let i = 0; i < nTracksInJet; i++) {
      const phi = jd.phi + rnd(-0.25, 0.25);
      const pt  = rnd(0.3, 1.0);
      const charge = Math.random() > 0.5 ? 1 : -1;
      tracks.push({phi, pt, curve: charge * rnd(0.04,0.18) * (1/pt), r: pt * R * 0.82});
    }
  }
  // sparse underlying-event tracks
  for (let i = 0; i < rndInt(3,8); i++) {
    const phi = rnd(0, Math.PI*2), pt = rnd(0.2, 0.5), charge = Math.random() > 0.5 ? 1 : -1;
    tracks.push({phi, pt, curve: charge * rnd(0.04,0.18) * (1/pt), r: pt * R * 0.82});
  }
  // soft calo noise
  for (let i = 0; i < rndInt(4,10); i++) {
    caloHits.push({phi: rnd(0, Math.PI*2), r: rnd(0.55,0.85),
                   w: rnd(0.005,0.012), ET: rnd(0.03,0.12), isEM: Math.random() > 0.3});
  }
}

function addMuon(phi, pt) {
  muons.push({phi: phi !== undefined ? phi : rnd(0, Math.PI*2),
              pt:  pt  !== undefined ? pt  : rnd(0.5, 1.0)});
}

// Electrons rendered as narrow EM calo deposits + a track (no muon line)
function addElectron(phi) {
  const p = phi !== undefined ? phi : rnd(0, Math.PI*2);
  const ET = rnd(0.55, 1.0);
  // tight EM cluster
  for (let k = 0; k < rndInt(4,8); k++) {
    caloHits.push({phi: p + rnd(-0.06,0.06), r: rnd(0.63,0.78),
                   w: rnd(0.006,0.014), ET: ET * rnd(0.4,1.0), isEM: true});
  }
  // matching track
  const charge = Math.random() > 0.5 ? 1 : -1;
  tracks.push({phi: p, pt: ET, curve: charge * rnd(0.04,0.12) * (1/ET), r: ET * R * 0.80});
}

// Photons: EM cluster only, no track
function addPhoton(phi) {
  const p = phi !== undefined ? phi : rnd(0, Math.PI*2);
  const ET = rnd(0.5, 1.0);
  for (let k = 0; k < rndInt(5,10); k++) {
    caloHits.push({phi: p + rnd(-0.05,0.05), r: rnd(0.63,0.76),
                   w: rnd(0.006,0.013), ET: ET * rnd(0.5,1.0), isEM: true});
  }
}

function randomPhi() { return rnd(0, Math.PI*2); }
function randomJetPhis(n) { return Array.from({length: n}, randomPhi); }
function backToBack(spread=0.15) {
  const phi1 = randomPhi();
  return [phi1, phi1 + Math.PI + rnd(-spread, spread)];
}

/* ── individual process generators ── */

function generateQCDDijet() {
  // 2 back-to-back high-ET jets, no leptons, minimal MET
  const [phi1, phi2] = backToBack(0.15);
  buildJets([{phi: phi1, ET: rnd(0.7,1.0)}, {phi: phi2, ET: rnd(0.7,1.0)}]);
  metMag = rnd(0, 0.10); metAngle = randomPhi();
  return {label: 'QCD dijet', nJ: 2};
}

function generateWJets() {
  // W→lν: 1 lepton (muon here) + 2-4 jets + large MET opposite lepton
  const nJ = rndInt(2, 4);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.4,0.85)})));
  const lepPhi = randomPhi();
  addMuon(lepPhi, rnd(0.6,1.0));
  metMag  = rnd(0.50, 0.78);
  metAngle = lepPhi + Math.PI + rnd(-0.4, 0.4);
  return {label: 'W+jets', nJ};
}

function generateZMuMu() {
  // Z→μμ: 2 back-to-back muons, 0-2 jets, near-zero MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.3,0.6)})));
  const [phi1, phi2] = backToBack(0.3);
  addMuon(phi1, rnd(0.6,1.0)); addMuon(phi2, rnd(0.6,1.0));
  metMag = rnd(0, 0.08); metAngle = randomPhi();
  return {label: 'Z→μμ', nJ};
}

function generateZEE() {
  // Z→ee: 2 back-to-back EM clusters, 0-2 jets, near-zero MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.3,0.6)})));
  const [phi1, phi2] = backToBack(0.3);
  addElectron(phi1); addElectron(phi2);
  metMag = rnd(0, 0.08); metAngle = randomPhi();
  return {label: 'Z→ee', nJ};
}

function generateTTbar() {
  // tt̄: 4-8 jets (2 b-jets implicit), 1-2 leptons, moderate MET
  const nJ = rndInt(4, 8);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.4,0.90)})));
  const nM = rndInt(1, 2);
  for (let i = 0; i < nM; i++) addMuon();
  metMag = rnd(0.35, 0.65); metAngle = randomPhi();
  return {label: 'tt̄', nJ};
}

function generateWW() {
  // WW: 2 leptons (opposite sign), ~2 jets, moderate MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.3,0.6)})));
  addMuon(); addMuon();
  metMag = rnd(0.30, 0.60); metAngle = randomPhi();
  return {label: 'WW', nJ};
}

function generateZZ() {
  // ZZ: 4 leptons (two Z→ll), few jets, very low MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.25,0.55)})));
  const [p1,p2] = backToBack(0.35); const [p3,p4] = backToBack(0.35);
  addMuon(p1); addMuon(p2); addMuon(p3); addMuon(p4);
  metMag = rnd(0, 0.08); metAngle = randomPhi();
  return {label: 'ZZ', nJ};
}

function generateWZ() {
  // WZ: 3 leptons + MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.3,0.6)})));
  const [p1,p2] = backToBack(0.3);
  addMuon(p1); addMuon(p2); addMuon();
  metMag = rnd(0.30, 0.55); metAngle = randomPhi();
  return {label: 'WZ', nJ};
}

function generateSingleTop() {
  // single top: 1 b-jet + 1-2 light jets, 1 lepton, moderate MET
  const nJ = rndInt(2, 3);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.4,0.80)})));
  addMuon();
  metMag = rnd(0.30, 0.60); metAngle = randomPhi();
  return {label: 'single top', nJ};
}

function generateHiggsBB() {
  // H→bb̄: 2 b-tagged jets (boosted or resolved) + associated W/Z → leptons/MET
  const nJ = rndInt(2, 4);
  const [phi1, phi2] = backToBack(0.25);
  const extraJs = randomJetPhis(nJ - 2).map(phi => ({phi, ET: rnd(0.3,0.65)}));
  buildJets([{phi: phi1, ET: rnd(0.6,1.0)}, {phi: phi2, ET: rnd(0.6,1.0)}, ...extraJs]);
  // associated production: add 1 lepton + MET (WH) or 2 muons (ZH) at random
  if (Math.random() > 0.5) { addMuon(); metMag = rnd(0.35,0.65); }
  else { addMuon(); addMuon(); metMag = rnd(0,0.10); }
  metAngle = randomPhi();
  return {label: 'H→bb̄', nJ};
}

function generateHiggsZZ4L() {
  // H→ZZ*→4l: 4 leptons, very low MET, few/no jets — the "golden channel"
  const nJ = rndInt(0, 1);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.25,0.50)})));
  const [p1,p2] = backToBack(0.4); const [p3,p4] = backToBack(0.4);
  addMuon(p1); addMuon(p2);
  // second Z can decay to electrons
  addElectron(p3); addElectron(p4);
  metMag = rnd(0, 0.06); metAngle = randomPhi();
  return {label: 'H→ZZ*→4l', nJ};
}

function generateHiggsGamGam() {
  // H→γγ: 2 isolated photons, few/no jets, low MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.25,0.55)})));
  const [phi1, phi2] = backToBack(0.25);
  addPhoton(phi1); addPhoton(phi2);
  metMag = rnd(0, 0.08); metAngle = randomPhi();
  return {label: 'H→γγ', nJ};
}

function generateSUSY() {
  // SUSY-like: many jets, ≥1 lepton, very large MET (missing neutralino)
  const nJ = rndInt(4, 8);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.45,0.95)})));
  const nM = rndInt(1, 2);
  for (let i = 0; i < nM; i++) addMuon();
  metMag = rnd(0.65, 0.95); metAngle = randomPhi();
  return {label: 'SUSY-like', nJ};
}

function generateMinBias() {
  // soft underlying event: very few low-ET jets, no leptons, negligible MET
  const nJ = rndInt(0, 2);
  buildJets(randomJetPhis(nJ).map(phi => ({phi, ET: rnd(0.12,0.38)})));
  metMag = 0; metAngle = 0;
  return {label: 'min. bias', nJ};
}

/* ── weighted process table ── */
const PROCESS_TABLE = [
  {w: 0.35, gen: generateQCDDijet},
  {w: 0.18, gen: generateWJets},
  {w: 0.08, gen: generateZMuMu},
  {w: 0.08, gen: generateZEE},
  {w: 0.10, gen: generateTTbar},
  {w: 0.05, gen: generateWW},
  {w: 0.04, gen: generateZZ},
  {w: 0.04, gen: generateWZ},
  {w: 0.04, gen: generateSingleTop},
  {w: 0.015,gen: generateHiggsBB},
  {w: 0.010,gen: generateHiggsZZ4L},
  {w: 0.010,gen: generateHiggsGamGam},
  {w: 0.02, gen: generateSUSY},
  {w: 0.04, gen: generateMinBias},
];
const TOTAL_WEIGHT = PROCESS_TABLE.reduce((s,p)=>s+p.w, 0);

function pickGenerator() {
  let r = Math.random() * TOTAL_WEIGHT;
  for (const p of PROCESS_TABLE) { r -= p.w; if (r <= 0) return p.gen; }
  return PROCESS_TABLE[PROCESS_TABLE.length-1].gen;
}

function generateEvent() {
  tracks=[]; caloHits=[]; muons=[]; jets=[];

  document.getElementById('event-ticker').textContent =
    'Event #'+String(eventNum).padStart(4,'0')+' · Lumi block '+rndInt(10,99);
  eventNum++;

  const result = pickGenerator()();

  document.getElementById('m-tracks').textContent = tracks.length;
  document.getElementById('m-jets').textContent   = result.nJ;
  if (metMag > 0.08) {
    document.getElementById('m-met').textContent = Math.round(metMag * 180) + ' GeV';
  } else {
    document.getElementById('m-met').textContent = '< 20 GeV';
  }
  document.getElementById('m-type').textContent = result.label;

  document.getElementById('status-txt').textContent='COLLISION';
  setTimeout(()=>document.getElementById('status-txt').textContent='CIRCULATING',900);
  animating=true; animT=0;
}

function drawBg(){
  ctx.fillStyle='#07090f';
  ctx.fillRect(0,0,W,H);
}
function drawGrid(){
  for(let i=1;i<=5;i++){
    ctx.beginPath(); ctx.arc(CX,CY,R*(i/5),0,Math.PI*2);
    ctx.strokeStyle='rgba(20,50,70,0.55)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  for(let i=0;i<12;i++){
    let phi=(i/12)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.lineTo(CX+Math.cos(phi)*R,CY+Math.sin(phi)*R);
    ctx.strokeStyle='rgba(20,50,70,0.4)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.strokeStyle='rgba(40,80,100,0.35)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(CX-R-20,CY); ctx.lineTo(CX+R+20,CY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX,CY-R-20); ctx.lineTo(CX,CY+R+20); ctx.stroke();

  ctx.font='9px "Space Mono", monospace';
  ctx.fillStyle='rgba(42,64,80,0.9)';
  ctx.textAlign='center';
  ctx.fillText('η=0', CX+R+22, CY+3);
  ctx.fillText('φ', CX+2, CY-R-18);

  let etaLabels=[['|η|=1',0.33],['|η|=2',0.62],['|η|=3',0.85]];
  for(let [label,frac] of etaLabels){
    ctx.fillStyle='rgba(30,48,64,0.85)';
    ctx.textAlign='left';
    ctx.fillText(label, CX+R*frac+3, CY-6);
  }
}
function drawCalo(pr){
  for(let h of caloHits){
    let p=Math.min(1,pr*2.5); if(p<=0) continue;
    let ir=R*(h.isEM?0.62:0.75);
    let or=Math.min(R*0.94, R*(h.isEM?0.75:0.88)*(0.3+0.7*p*h.ET/0.5+h.ET*0.4));
    let p1=h.phi-h.w, p2=h.phi+h.w;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(p1)*ir, CY+Math.sin(p1)*ir);
    ctx.lineTo(CX+Math.cos(p1)*or, CY+Math.sin(p1)*or);
    ctx.arc(CX,CY,or,p1,p2);
    ctx.lineTo(CX+Math.cos(p2)*ir, CY+Math.sin(p2)*ir);
    ctx.arc(CX,CY,ir,p2,p1,true);
    ctx.closePath();
    let col=h.isEM?'#d4a44a':'#8a4ac0';
    ctx.fillStyle=hexAlpha(col,(0.52+h.ET*0.4)*p);
    ctx.fill();
    ctx.strokeStyle=hexAlpha(col,0.25*p); ctx.lineWidth=0.5; ctx.stroke();
  }
}
function drawTracks(pr){
  for(let t of tracks){
    let len=t.r*Math.min(1,pr*1.8), steps=60;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    let phi=t.phi;
    for(let s=1;s<=steps;s++){
      let frac=s/steps, r=len*frac;
      phi=t.phi+t.curve*r;
      ctx.lineTo(CX+Math.cos(phi)*r, CY+Math.sin(phi)*r);
    }
    ctx.strokeStyle=hexAlpha('#6ab4d4',0.4); ctx.lineWidth=0.65; ctx.stroke();
  }
}
function drawMuons(pr){
  for(let m of muons){
    let ext=R*1.08*Math.min(1,pr*1.5);
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.lineTo(CX+Math.cos(m.phi)*ext, CY+Math.sin(m.phi)*ext);
    ctx.strokeStyle=hexAlpha('#4ac060',0.8); ctx.lineWidth=1.5; ctx.setLineDash([]); ctx.stroke();
    if(pr>0.6){
      ctx.beginPath(); ctx.arc(CX+Math.cos(m.phi)*ext, CY+Math.sin(m.phi)*ext, 3,0,Math.PI*2);
      ctx.fillStyle='#4ac060'; ctx.fill();
    }
  }
}
function drawJets(pr){
  for(let j of jets){
    if(pr<0.3) continue;
    let p=Math.min(1,(pr-0.3)/0.5);
    let len=R*0.84*p, sp=j.dphi;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.lineTo(CX+Math.cos(j.phi-sp)*len, CY+Math.sin(j.phi-sp)*len);
    ctx.arc(CX,CY,len,j.phi-sp,j.phi+sp);
    ctx.closePath();
    ctx.fillStyle=hexAlpha('#c08820',0.06*p); ctx.fill();
    ctx.strokeStyle=hexAlpha('#c08820',0.18*p);
    ctx.lineWidth=0.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);

    if(p>0.7){
      let lx=CX+Math.cos(j.phi)*(len+12);
      let ly=CY+Math.sin(j.phi)*(len+12);
      ctx.fillStyle=hexAlpha('#a07820',0.75*p);
      ctx.font='9px "Space Mono", monospace';
      ctx.textAlign='center';
      ctx.fillText('jet', lx, ly);
    }
  }
}
function drawMET(pr){
  if(metMag<0.1||pr<0.7) return;
  let p=Math.min(1,(pr-0.7)/0.4);
  let len=R*metMag*p;
  let ex=CX+Math.cos(metAngle)*len, ey=CY+Math.sin(metAngle)*len;
  ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(ex,ey);
  ctx.strokeStyle=hexAlpha('#d44a4a',0.82*p); ctx.lineWidth=1.5;
  ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
  let dx=ex-CX,dy=ey-CY,nm=Math.sqrt(dx*dx+dy*dy); dx/=nm; dy/=nm;
  let al=10,aw=5;
  ctx.beginPath();
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-dx*al-dy*aw, ey-dy*al+dx*aw);
  ctx.lineTo(ex-dx*al+dy*aw, ey-dy*al-dx*aw);
  ctx.closePath();
  ctx.fillStyle=hexAlpha('#d44a4a',0.82*p); ctx.fill();

  ctx.fillStyle=hexAlpha('#d44a4a',0.7*p);
  ctx.font='9px "Space Mono", monospace';
  ctx.textAlign='center';
  let lx=CX+Math.cos(metAngle)*(len+16);
  let ly=CY+Math.sin(metAngle)*(len+16);
  ctx.fillText('Eᵀmiss', lx, ly);
}
function drawVertex(){
  ctx.beginPath(); ctx.arc(CX,CY,2.5,0,Math.PI*2);
  ctx.fillStyle='#d0e8f8'; ctx.fill();
  ctx.beginPath(); ctx.arc(CX,CY,6,0,Math.PI*2);
  ctx.strokeStyle='rgba(160,210,240,0.25)'; ctx.lineWidth=1; ctx.stroke();
}

function frame(ts){
  let dt=ts-last; last=ts;
  autoT+=dt;
  if(autoT>3400){ autoT=0; generateEvent(); }
  if(animating){ animT+=dt; if(animT>animDur) animating=false; }
  let pr=animating?ease(Math.min(1,animT/animDur)):1;

  drawBg(); drawGrid();
  drawCalo(pr); drawJets(pr); drawTracks(pr); drawMuons(pr); drawMET(pr);
  if(pr>0.1) drawVertex();
  requestAnimationFrame(frame);
}
generateEvent();
requestAnimationFrame(frame);
